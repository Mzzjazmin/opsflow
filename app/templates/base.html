<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpsFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .page-title {
            font-weight: 700;
            color: #1f2937;
        }

        .section-subtitle {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .soft-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .metric-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        .metric-number {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
        }

        .list-group-item {
            border-radius: 12px !important;
            margin-bottom: 10px;
            border: 1px solid #eef2f7;
        }

        .btn {
            border-radius: 10px;
        }

        .form-control,
        .form-select,
        textarea {
            border-radius: 10px !important;
        }

        .top-space {
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .mobile-stack {
                display: flex;
                flex-direction: column;
                gap: 8px;
                width: 100%;
                margin-top: 12px;
            }

            .navbar .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">OpsFlow</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#opsflowNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="opsflowNav">
            <div class="ms-auto mobile-stack">

                <a class="btn btn-outline-light btn-sm me-2" href="/dashboard">Dashboard</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/tasks">Tasks</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/my-tasks">My Tasks</a>

                {% if current_user.role in ["admin", "supervisor"] %}
                    <a class="btn btn-outline-light btn-sm me-2" href="/approvals">Approvals</a>
                    <a class="btn btn-outline-light btn-sm me-2" href="/my-investigations">My Investigations</a>
                {% endif %}

                <a class="btn btn-outline-light btn-sm me-2" href="/issues">Issues</a>
                <a class="btn btn-danger btn-sm" href="/logout">Logout</a>

            </div>
        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container top-space mb-5">
    {% block content %}{% endblock %}
</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
