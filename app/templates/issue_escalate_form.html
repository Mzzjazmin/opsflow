{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h2 class="page-title mb-1">Escalate Issue</h2>
    <p class="section-subtitle mb-0">Capture the investigation note before escalation.</p>
</div>

<div class="card soft-card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-4">
                <label class="form-label">Investigation Note</label>
                <textarea name="investigation_note" class="form-control" rows="5" required></textarea>
            </div>

            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-danger">Confirm Escalation</button>
                <a href="/issues/{{ issue.id }}" class="btn btn-secondary">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
