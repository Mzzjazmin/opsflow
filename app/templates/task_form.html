{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h2 class="page-title mb-1">New Task</h2>
    <p class="section-subtitle mb-0">Create and assign a task for execution.</p>
</div>

<div class="card soft-card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Task Title</label>
                <input type="text" name="title" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Task Description</label>
                <textarea name="description" class="form-control" rows="4"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select name="priority" class="form-select">
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Assign To</label>
                <select name="assigned_to_id" class="form-select">
                    <option value="">-- Select User --</option>
                    {% for user in users %}
                        <option value="{{ user.id }}">{{ user.full_name }} ({{ user.role }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success">Save Task</button>
                <a href="/tasks" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
