{% extends "base.html" %}

{% block content %}
<div class="mb-4">
    <h2 class="page-title mb-1">Resolve Issue</h2>
    <p class="section-subtitle mb-0">Capture the resolution details before closing this issue.</p>
</div>

<div class="card soft-card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-4">
                <label class="form-label">Resolution Note</label>
                <textarea name="resolution_note" class="form-control" rows="5" placeholder="Enter resolution details" required></textarea>
            </div>

            <div class="d-flex flex-column flex-md-row gap-2">
                <button type="submit" class="btn btn-success">Confirm Resolution</button>
                <a href="/issues/{{ issue.id }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
